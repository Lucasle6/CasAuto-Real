<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" role="img">
  <title>AWS VPC-Architektur mit oeffentlichem und privatem Subnetz</title>
  <desc>Internetverkehr geht entweder direkt zu einem S3-Bucket fuer das Frontend oder ueber das Internet Gateway in eine VPC. Innerhalb der VPC laeuft das Backend im oeffentlichen Subnetz und greift auf die MySQL-Datenbank im privaten Subnetz zu.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="420" fill="#ffffff"/>
  <rect x="270" y="20" width="140" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Internet</text>
  <line x1="300" y1="60" x2="150" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="60" x2="450" y2="80" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="110" width="180" height="70" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">S3</text>
  <text x="150" y="156" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Frontend (statisch)</text>
  <rect x="280" y="90" width="340" height="290" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="300" y="118" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">VPC</text>
  <text x="300" y="136" text-anchor="start" font-family="sans-serif" font-size="12" fill="#185FA5">Internet Gateway</text>
  <rect x="300" y="150" width="300" height="80" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="450" y="176" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">Public subnet</text>
  <text x="450" y="196" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854F0B">Backend EC2 (API)</text>
  <line x1="450" y1="230" x2="450" y2="270" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="250" text-anchor="start" font-family="sans-serif" font-size="12" fill="#444441">DB-Zugriff</text>
  <rect x="300" y="270" width="300" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="450" y="296" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Private subnet</text>
  <text x="450" y="316" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">MySQL-Datenbank</text>
</svg>
